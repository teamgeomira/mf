<!DOCTYPE html>
<html lang="sv">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #2c5a74; }

        .btn-primary, .btn-secondary, .btn-danger, .btn-success { border: none; padding: 0.8rem 1.5rem; border-radius: 2rem; font-weight: 600; cursor: pointer; font-size: 1rem; display: inline-flex; align-items: center; gap: 0.5rem; }

        .code-badge { background: #e67e22; color: white; padding: 0.3rem 0.8rem; border-radius: 2rem; font-family: monospace; font-size: 0.9rem; display: inline-block; }

<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-cloud-upload-alt"></i> Admin – Ladda upp underlag</h1>

            <div class="form-group">

                </div>

            </div>
            <div class="form-group">

        <div class="form-group">
            <label><i class="fas fa-file-alt"></i> Beskrivning</label>

        <div class="form-group">
            <label><i class="fas fa-paperclip"></i> Välj filer</label>
            <div class="dropzone" id="dropzone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Dra och släpp filer hit</p>
                <small>Alla format stöds: PDF, DWG, ZIP, JPG, PNG, MP4, DOCX, XLSX</small>
                <div class="btn-secondary" style="display: inline-block; margin-top: 10px; padding: 0.5rem 1rem;">

<div id="toast" class="toast">✅ Klart</div>

<script src="empresas-proyectos.js"></script>
<script>
    // ========== FIREBASE KONFIGURATION ==========

    function sanitizeForFirebase(str) {
        return str.replace(/\./g, '-').replace(/[#$\[\]\/]/g, '_').replace(/\s+/g, '_');
    }
    
    function getFirebasePath(company, project, code) {
        return `underlag/${sanitizeForFirebase(company)}/${sanitizeForFirebase(project)}/${sanitizeForFirebase(code)}`;
    }

    // DOM element
    const empresaSearchInput = document.getElementById('empresaSearchInput');
    const empresaDropdown = document.getElementById('empresaDropdown');
    const empresaHidden = document.getElementById('empresaInput');
    const proyectoSearchInput = document.getElementById('proyectoSearchInput');
    const proyectoDropdown = document.getElementById('proyectoDropdown');
    const proyectoHidden = document.getElementById('proyectoInput');
    const codeInput = document.getElementById('codeInput');
    const descriptionInput = document.getElementById('descriptionInput');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileListContainer = document.getElementById('fileListContainer');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const resultContainer = document.getElementById('resultContainer');
    const existingFilesCard = document.getElementById('existingFilesCard');
    const existingFilesList = document.getElementById('existingFilesList');
    const deleteCodeBtn = document.getElementById('deleteCodeBtn');
    const toast = document.getElementById('toast');
    const manageBtn = document.getElementById('manageBtn');

    let selectedFiles = [];
    let currentData = null;
    let empresaLimit = 10;
    let proyectoLimit = 10;
    let currentEmpresas = [];
    let currentProyectos = [];

    function showToast(msg, isError = false) {
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? "#b91c2c" : "#1a2f3e";
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 2500);
    }

    function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (ext === 'pdf') return 'fa-file-pdf';
        if (['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext)) return 'fa-file-image';
        if (['mp4','webm','mov','avi'].includes(ext)) return 'fa-file-video';
        if (['zip','rar','7z'].includes(ext)) return 'fa-file-archive';
        if (['dwg','dxf'].includes(ext)) return 'fa-draw-polygon';
        if (['doc','docx'].includes(ext)) return 'fa-file-word';
        if (['xls','xlsx','csv'].includes(ext)) return 'fa-file-excel';
        return 'fa-file';
    }

    function getFileIconAndColor(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        switch (ext) {
            case 'pdf': return { icon: 'fa-file-pdf', color: '#e74c3c' };
            case 'dwg': case 'dxf': return { icon: 'fa-draw-polygon', color: '#e67e22' };
            case 'jpg': case 'jpeg': case 'png': case 'gif': case 'webp': case 'bmp': case 'svg': return { icon: 'fa-file-image', color: '#3498db' };
            case 'mp4': case 'webm': case 'mov': case 'avi': return { icon: 'fa-file-video', color: '#9b59b6' };
            case 'zip': case 'rar': case '7z': return { icon: 'fa-file-archive', color: '#f39c12' };
            case 'doc': case 'docx': return { icon: 'fa-file-word', color: '#2980b9' };
            case 'xls': case 'xlsx': case 'csv': return { icon: 'fa-file-excel', color: '#27ae60' };
            default: return { icon: 'fa-file', color: '#5a8eb0' };
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function renderFileList() {
        if (selectedFiles.length === 0) {
            fileListContainer.innerHTML = '<div style="text-align:center; color:#9bb3c9; padding:1rem;"><i class="fas fa-inbox"></i> Inga filer valda</div>';
            return;
        }
        fileListContainer.innerHTML = selectedFiles.map((file, index) => `
            <div class="file-item">
                <i class="fas ${getFileIcon(file.name)}"></i>
                <span class="file-name">${escapeHtml(file.name)}</span>
                <span class="file-size">${formatSize(file.size)}</span>
                <button class="remove-file" data-index="${index}"><i class="fas fa-times"></i> Ta bort</button>
            </div>
        `).join('');
        document.querySelectorAll('.remove-file').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = parseInt(btn.dataset.index);
                selectedFiles.splice(index, 1);
                renderFileList();
            });
        });
    }

    // ========== DROPDOWN FUNCTIONS ==========
    async function actualizarDropdownEmpresas() {
        const searchTerm = empresaSearchInput.value.toLowerCase();
        let empresas = await filtrarEmpresas(searchTerm);
        currentEmpresas = empresas;
        const showCount = Math.min(empresas.length, empresaLimit);
        const visibleEmpresas = empresas.slice(0, showCount);
        const hasMore = empresas.length > empresaLimit;
        
        if (visibleEmpresas.length === 0 && searchTerm) {
            empresaDropdown.innerHTML = `<div style="color:#999;">Inget företag hittades. Klicka på "Hantera" för att lägga till.</div>`;
        } else {
            let html = visibleEmpresas.map(emp => `<div data-value="${escapeHtml(emp)}">${escapeHtml(emp)}</div>`).join('');
            if (hasMore) {
                html += `<div class="scroll-control" id="empresaShowMoreBtn">➕ Visa fler (${empresas.length - empresaLimit} fler)</div>`;
            } else if (empresas.length > 10) {
                html += `<div class="scroll-control" id="empresaShowLessBtn">➖ Visa färre</div>`;
            }
            empresaDropdown.innerHTML = html;
        }
        empresaDropdown.querySelectorAll('div[data-value]').forEach(div => {
            div.addEventListener('click', async () => {
                const value = div.getAttribute('data-value');
                empresaSearchInput.value = value;
                empresaHidden.value = value;
                empresaDropdown.style.display = 'none';
                await actualizarProyectosPorEmpresa(value);
                await cargarArchivosExistentes();
            });
        });
        const moreBtn = empresaDropdown.querySelector('#empresaShowMoreBtn');
        if (moreBtn) moreBtn.addEventListener('click', () => { empresaLimit += 20; actualizarDropdownEmpresas(); });
        const lessBtn = empresaDropdown.querySelector('#empresaShowLessBtn');
        if (lessBtn) lessBtn.addEventListener('click', () => { empresaLimit = 10; actualizarDropdownEmpresas(); });
    }
    
    async function actualizarProyectosPorEmpresa(empresa) {
        const proyectos = await getProyectos(empresa);
        currentProyectos = proyectos;
        proyectoSearchInput.disabled = false;
        await actualizarDropdownProyectos();
    }
    
    async function actualizarDropdownProyectos() {
        if (!empresaHidden.value) {
            proyectoSearchInput.disabled = true;
            proyectoDropdown.innerHTML = '';
            return;
        }
        const searchTerm = proyectoSearchInput.value.toLowerCase();
        let proyectos = currentProyectos;
        const filtrados = searchTerm ? proyectos.filter(p => p.toLowerCase().includes(searchTerm)) : proyectos;
        const showCount = Math.min(filtrados.length, proyectoLimit);
        const visibleProyectos = filtrados.slice(0, showCount);
        const hasMore = filtrados.length > proyectoLimit;
        
        if (visibleProyectos.length === 0 && searchTerm) {
            proyectoDropdown.innerHTML = `<div style="color:#999;">Inget projekt hittades. Klicka på "Hantera" för att lägga till.</div>`;
        } else {
            let html = visibleProyectos.map(proj => `<div data-value="${escapeHtml(proj)}">${escapeHtml(proj)}</div>`).join('');
            if (hasMore) {
                html += `<div class="scroll-control" id="proyectoShowMoreBtn">➕ Visa fler (${filtrados.length - proyectoLimit} fler)</div>`;
            } else if (filtrados.length > 10) {
                html += `<div class="scroll-control" id="proyectoShowLessBtn">➖ Visa färre</div>`;
            }
            proyectoDropdown.innerHTML = html;
        }
        proyectoDropdown.querySelectorAll('div[data-value]').forEach(div => {
            div.addEventListener('click', async () => {
                const value = div.getAttribute('data-value');
                proyectoSearchInput.value = value;
                proyectoHidden.value = value;
                proyectoDropdown.style.display = 'none';
                await cargarArchivosExistentes();
            });
        });
        const moreBtn = proyectoDropdown.querySelector('#proyectoShowMoreBtn');
        if (moreBtn) moreBtn.addEventListener('click', () => { proyectoLimit += 20; actualizarDropdownProyectos(); });
        const lessBtn = proyectoDropdown.querySelector('#proyectoShowLessBtn');
        if (lessBtn) lessBtn.addEventListener('click', () => { proyectoLimit = 10; actualizarDropdownProyectos(); });
    }
    
    function setupDropdowns() {
        empresaSearchInput.addEventListener('focus', () => { actualizarDropdownEmpresas(); empresaDropdown.style.display = 'block'; });
        empresaSearchInput.addEventListener('input', () => { actualizarDropdownEmpresas(); empresaDropdown.style.display = 'block'; });
        proyectoSearchInput.addEventListener('focus', () => { if (empresaHidden.value) { actualizarDropdownProyectos(); proyectoDropdown.style.display = 'block'; } });
        proyectoSearchInput.addEventListener('input', () => { if (empresaHidden.value) { actualizarDropdownProyectos(); proyectoDropdown.style.display = 'block'; } });
        document.addEventListener('click', (e) => {
            if (!empresaSearchInput.contains(e.target) && !empresaDropdown.contains(e.target)) empresaDropdown.style.display = 'none';
            if (!proyectoSearchInput.contains(e.target) && !proyectoDropdown.contains(e.target)) proyectoDropdown.style.display = 'none';
        });
    }

    // ========== CLOUDINARY & FIREBASE ==========
    async function uploadFileToCloudinary(file, company, project, code) {
        const formData = new FormData();
        const timestamp = Date.now();
        const safeName = file.name.replace(/[^a-zA-Z0-9åäöÅÄÖ.\-]/g, '_');
        const publicId = `${FOLDER}/${sanitizeForFirebase(company)}/${sanitizeForFirebase(project)}/${sanitizeForFirebase(code)}/${timestamp}_${safeName}`;
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        formData.append('folder', `${FOLDER}/${sanitizeForFirebase(company)}/${sanitizeForFirebase(project)}/${sanitizeForFirebase(code)}`);
        formData.append('public_id', publicId);
        formData.append('resource_type', 'auto');
        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || 'Uppladdning misslyckades');
            const downloadUrl = data.secure_url + (data.secure_url.includes('?') ? '&fl_attachment' : '?fl_attachment');
            return {
                success: true,
                publicId: data.public_id,
                filename: file.name,
                size: file.size,
                date: new Date().toISOString(),
                previewUrl: data.secure_url,
                downloadUrl: downloadUrl,
                type: file.name.split('.').pop().toLowerCase()
            };
        } catch (err) {
            console.error(err);
            return { success: false, name: file.name, error: err.message };
        }
    }

    async function saveToFirebase(company, project, code, description, files) {
        const path = getFirebasePath(company, project, code);
        const codeRef = database.ref(path);
        const snapshot = await codeRef.once('value');
        let existingData = snapshot.val() || {};
        const filesObj = {};
        files.forEach((file, index) => {
            const fileId = `${Date.now()}_${index}_${file.filename.replace(/[^a-zA-Z0-9]/g, '_')}`;
            filesObj[fileId] = {
                filename: file.filename,
                size: file.size,
                date: file.date,
                previewUrl: file.previewUrl,
                downloadUrl: file.downloadUrl,
                type: file.type
            };
        });
        const existingFiles = existingData.files || {};
        const allFiles = { ...existingFiles, ...filesObj };
        await codeRef.set({
            description: description || existingData.description || '',
            company: company,
            project: project,
            code: code,
            createdAt: existingData.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            files: allFiles
        });
        return true;
    }

    async function loadExistingData(company, project, code) {
        if (!company || !project || !code) return null;
        try {
            const path = getFirebasePath(company, project, code);
            const snapshot = await database.ref(path).once('value');
            return snapshot.val();
        } catch (error) {
            console.error('Fel vid laddning:', error);
            return null;
        }
    }

    async function cargarArchivosExistentes() {
        const company = empresaHidden.value;
        const project = proyectoHidden.value;
        const code = codeInput.value.trim().toUpperCase();
        if (!company || !project || !code) {
            existingFilesCard.style.display = 'none';
            return;
        }
        currentData = await loadExistingData(company, project, code);
        if (!currentData || !currentData.files || Object.keys(currentData.files).length === 0) {
            existingFilesCard.style.display = 'none';
            return;
        }
        existingFilesCard.style.display = 'block';
        let html = '';
        if (currentData.description) html += `<p><strong>Beskrivning:</strong> ${escapeHtml(currentData.description)}</p>`;
        html += `<div style="margin-top: 1rem;">`;
        for (const [fileId, file] of Object.entries(currentData.files)) {
            const { icon, color } = getFileIconAndColor(file.filename);
            html += `
                <div class="file-item-existing" data-fileid="${fileId}">
                    <i class="fas ${icon}" style="color:${color}; font-size:1.2rem;"></i>
                    <span class="file-name">${escapeHtml(file.filename)}</span>
                    <span class="file-size">${formatSize(file.size)}</span>
                    <div style="display: flex; gap: 0.3rem;">
                        <button class="btn-secondary" style="padding: 0.2rem 0.6rem; font-size:0.7rem;" onclick="window.open('${file.previewUrl}', '_blank')"><i class="fas fa-eye"></i> Visa</button>
                        <button class="btn-secondary delete-single-file" data-fileid="${fileId}" style="background:#fee2e2; color:#b91c2c;"><i class="fas fa-trash"></i> Ta bort</button>
                    </div>
                </div>
            `;
        }
        html += `</div>`;
        existingFilesList.innerHTML = html;
        deleteCodeBtn.style.display = 'inline-flex';
        
        document.querySelectorAll('.delete-single-file').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const fileId = btn.getAttribute('data-fileid');
                if (confirm('Ta bort denna fil?')) {
                    await deleteSingleFile(empresaHidden.value, proyectoHidden.value, codeInput.value.trim().toUpperCase(), fileId);
                }
            });
        });
    }

    async function deleteSingleFile(company, project, code, fileId) {
        const path = getFirebasePath(company, project, code);
        await database.ref(`${path}/files/${fileId}`).remove();
        showToast('✅ Fil borttagen');
        await cargarArchivosExistentes();
    }

    async function deleteEntireCode(company, project, code) {
        if (!confirm(`Är du säker på att du vill ta bort ALLA filer för koden ${code}?`)) return;
        const path = getFirebasePath(company, project, code);
        await database.ref(path).remove();
        showToast('✅ Kod och alla filer borttagna');
        existingFilesCard.style.display = 'none';
        currentData = null;
    }

    deleteCodeBtn.addEventListener('click', async () => {
        await deleteEntireCode(empresaHidden.value, proyectoHidden.value, codeInput.value.trim().toUpperCase());
    });

    async function uploadFiles() {
        const company = empresaHidden.value;
        const project = proyectoHidden.value;
        const code = codeInput.value.trim().toUpperCase();
        if (!company) { showToast('❌ Välj företag', true); return; }
        if (!project) { showToast('❌ Välj projekt', true); return; }
        if (!code) { showToast('❌ Ange kod (t.ex. CBB.32)', true); return; }
        if (selectedFiles.length === 0) { showToast('❌ Välj minst en fil', true); return; }
        
        uploadBtn.disabled = true;
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        let completed = 0;
        const total = selectedFiles.length;
        const uploadedFiles = [];
        showToast(`📤 Laddar upp ${total} fil(er)...`);
        
        for (let i = 0; i < selectedFiles.length; i++) {
            const result = await uploadFileToCloudinary(selectedFiles[i], company, project, code);
            if (result.success) {
                uploadedFiles.push(result);
            } else {
                showToast(`❌ Misslyckades: ${result.name}`, true);
            }
            completed++;
            progressFill.style.width = `${(completed/total)*100}%`;
        }
        
        if (uploadedFiles.length > 0) {
            const description = descriptionInput.value.trim();
            await saveToFirebase(company, project, code, description, uploadedFiles);
            
            let baseUrl = window.location.href;
            if (baseUrl.includes('index.html')) baseUrl = baseUrl.replace('index.html', '');
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            const ENLACE = `${baseUrl}viewer.html?company=${encodeURIComponent(company)}&project=${encodeURIComponent(project)}&code=${encodeURIComponent(code)}`;
            
            resultContainer.style.display = 'block';
            resultContainer.innerHTML = `
                <h4><i class="fas fa-check-circle" style="color:#10b981;"></i> Filer uppladdade!</h4>
                <p>📁 ${uploadedFiles.length} fil(er) uppladdade</p>
                <p>🏢 Företag: <strong>${escapeHtml(company)}</strong> | 📂 Projekt: <strong>${escapeHtml(project)}</strong> | 🏷️ Kod: <strong class="code-badge">${escapeHtml(code)}</strong></p>
                <hr>
                <p><strong>🔗 LÄNK ATT KLISTRA IN I EXCEL/PDF:</strong></p>
                <input type="text" id="linkInput" value="${ENLACE}" readonly style="width:100%; padding:0.8rem; border-radius:0.8rem; border:2px solid #cbdde9; margin:0.5rem 0; font-family: monospace;">
                <button id="copyLinkBtn" class="btn-primary"><i class="fas fa-copy"></i> Kopiera länk</button>
                <a href="${ENLACE}" target="_blank" class="btn-secondary" style="text-decoration:none;"> Testa länk</a>
            `;
            document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
                document.getElementById('linkInput').select();
                document.execCommand('copy');
                showToast('📋 Länk kopierad');
            });
            await cargarArchivosExistentes();
            showToast(`✅ ${uploadedFiles.length} fil(er) uppladdade`);
        }
        selectedFiles = [];
        renderFileList();
        uploadBtn.disabled = false;
        setTimeout(() => {
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
        }, 1000);
    }

    function clearAll() {
        selectedFiles = [];
        renderFileList();
        fileInput.value = '';
        showToast('🧹 Rensat');
    }

    manageBtn.addEventListener('click', () => {
        mostrarModalGestion(() => {
            actualizarDropdownEmpresas();
            if (empresaHidden.value) actualizarProyectosPorEmpresa(empresaHidden.value);
            cargarArchivosExistentes();
        });
    });

    let debounceTimer;
    codeInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => cargarArchivosExistentes(), 500);
    });

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', e => {
        e.preventDefault();
        dropzone.classList.remove('drag-over');
        selectedFiles.push(...Array.from(e.dataTransfer.files));
        renderFileList();
    });
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
        selectedFiles.push(...Array.from(e.target.files));
        renderFileList();
        fileInput.value = '';
    });
    uploadBtn.addEventListener('click', uploadFiles);
    clearBtn.addEventListener('click', clearAll);

    setupDropdowns();
    actualizarDropdownEmpresas();
    renderFileList();
    console.log("✅ Admin redo – Firebase ansluten");
</script>
</body>
</html>
